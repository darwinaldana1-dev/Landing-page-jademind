<!doctype html><html lang="es"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JadeMind — Logo animado</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
 :root{--jade:#02B981;--jade-d:#01976a;--ink:#0c1115;--ink2:#11181d;}
 *{box-sizing:border-box;margin:0}
 body{font-family:Poppins,system-ui,sans-serif;background:transparent;
       color:#e8f1ee;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;padding:10px;overflow:hidden;}
 .stage{display:flex;flex-direction:column;align-items:center;gap:6px}
 svg.logo{width:min(58vw,360px);height:auto}
 .word{font-weight:700;font-size:clamp(34px,7vw,62px);letter-spacing:-1px;opacity:0;
        transform:translateY(14px);animation:rise .8s ease forwards 1.5s}
 .word .j{color:var(--jade)} .word .m{color:#cfe0db}
 @keyframes rise{to{opacity:1;transform:none}}
 .tag{opacity:0;color:#7fb3a4;font-weight:400;font-size:clamp(12px,2.4vw,15px);letter-spacing:3px;
       text-transform:uppercase;animation:rise .8s ease forwards 1.9s}
 .row{display:flex;gap:14px;margin-top:8px;opacity:0;animation:rise .8s ease forwards 2.2s}
 button{font-family:inherit;font-weight:600;font-size:14px;color:#04130d;background:var(--jade);
        border:0;border-radius:999px;padding:11px 22px;cursor:pointer;transition:.2s}
 button:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(2,185,129,.4)}
 button.alt{background:transparent;color:var(--jade);box-shadow:inset 0 0 0 1.5px var(--jade)}
 .swatches{display:flex;gap:10px;margin-top:2px;opacity:0;animation:rise .8s ease forwards 2.5s}
 .sw{width:30px;height:30px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.4)}
 
  .fct{opacity:0;transform-box:fill-box;transform-origin:center;
       animation:ignite .55s cubic-bezier(.2,.7,.3,1) forwards var(--d),
                 ripple 4.2s ease-in-out infinite calc(var(--d) + 1.8s);}
  @keyframes ignite{from{opacity:0;transform:scale(.35)}to{opacity:1;transform:scale(1)}}
  @keyframes ripple{0%,14%,100%{filter:brightness(1)}6%{filter:brightness(1.5)}}
  .brain{animation:glow 3.4s ease-in-out infinite 2.2s}
  @keyframes glow{0%,100%{filter:drop-shadow(0 0 10px rgba(2,185,129,.30))}
                  50%{filter:drop-shadow(0 0 26px rgba(2,185,129,.65))}}

</style></head><body>
